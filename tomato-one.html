<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=320, initial-scale=1.0"/>
    <title>Radish One</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/middle.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/responsive.css">

    <!-- Vue -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <script src="js/main.js"></script>
</head>
<body>

<div id="app">

<header>
    <div class="container d-flex justify-content-between align-items-center py-3">
        <img src="images/header.png" class="logo" alt="Logo">

        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="#">About</a>
            <a href="tomato-all.html">Products</a>
            <a href="contact.html">Contact</a>
        </nav>
    </div>
</header>

<section class="container tomato-one-page mt-5 mb-5" v-if="product.id">
    <div class="row align-items-center g-4">
        <div class="col-md-6 text-center">
            <img :src="product.image" :alt="product.title" class="img-fluid tomato-one-img">
        </div>

        <div class="col-md-6">
            <h1 class="mb-3">{{ product.title }}</h1>
            <p class="tomato-one-text">{{ product.desc }}</p>

            <h4 class="mt-4">Characteristics</h4>
            <ul class="tomato-list">
                <li>{{ product.short_text }}</li>
                <li>High quality seeds</li>
                <li>Fresh market variety</li>
                <li>Good productivity</li>
                <li>Professional selection</li>
            </ul>

            <a href="#" class="btn btn-success mt-3" @click.prevent="addToCart(product.id)" v-if="btnVisible == 0">Add to cart</a>
            <a href="contact.html" class="btn btn-success mt-3" v-if="btnVisible == 1">Go to cart</a>
        </div>
    </div>
</section>

<section class="container mt-5 mb-5 text-center" v-else>
    <h2>Product not selected</h2>
    <a href="tomato-all.html" class="btn btn-success mt-3">Go to products</a>
</section>

<footer class="footer text-center">
    <p>© 2026 Agridera</p>
</footer>

</div>

</body>
</html>
