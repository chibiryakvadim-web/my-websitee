<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=320, initial-scale=1.0"/>
    <title>Radishes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/middle.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/responsive.css">

    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <script src="js/main.js"></script>
</head>
<body>

<div id="app">

<header>
    <div class="container d-flex justify-content-between align-items-center py-3">
        <img src="images/header.png" class="logo" alt="Logo">

        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="#">About</a>
            <a href="tomato-all.html">Products</a>
            <a href="contact.html">Contact</a>
        </nav>
    </div>
</header>

<section class="container text-center mt-5">
    <h1>Radishes</h1>
    <p class="section-subtitle">All available radish seeds</p>
    <img src="img/radish-banner.jpg" alt="Radish Banner" class="img-fluid category-banner mt-3">
</section>

<section class="container mt-5 mb-5 radish-page">
    <div class="row g-4">
        <div class="col-md-4" v-for="p in products" :key="p.id">
            <div class="card h-100 text-center p-3 shadow-sm">
                <a :href="'tomato-one.html#' + p.id">
                    <div class="tomato-img-wrap">
                        <img :src="p.image" class="img-fluid mx-auto tomato-img" :alt="p.title">
                    </div>
                </a>

                <h4 class="mt-3">
                    <a :href="'tomato-one.html#' + p.id" class="text-decoration-none text-dark">
                        {{ p.title }}
                    </a>
                </h4>

                <p>{{ p.short_text }}</p>
            </div>
        </div>
    </div>
</section>

<footer class="footer text-center">
    <p>© 2026 Agridera</p>
</footer>

</div>

</body>
</html>
